<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Цілі</title>
    <link rel="icon" type="image/png" href="images/logoYPM.svg">
    <link rel="stylesheet" href="css/cilipage.css">
    <link rel="stylesheet" href="css/Modal/modalProfile.css">
</head>
<body>
<header class="header">
   <div class="header-left">
        <div class="logo">
          <img src="images/logoYPM.svg" alt="YuPeMo">
          <h4><span style="-webkit-text-stroke: 1px #4A4D45; color: #E6FFBE;">YuPeMo</span></h4>
        </div>
        <nav class="menu">
           <button onclick="window.location.href='mainpage.html';" class="mainpage"><b>Головня Сторінка</b></button> 
           <button onclick="window.location.href='mainservicepage.html';" class="mainservicepage"><b>Загальна Статиска</b></button> 
           <button onclick="window.location.href='dohod.html';" class="plusmoney"><b>Доходи</b></button>
           <button onclick="window.location.href='vitraty.html';" class="minusmoney"><b>Витрати</b></button>
        </nav>
    </div>

    <div class="header-right">
       <div class="user">
           <span id="openProfile" onclick="openModal()" >Ім’я_користувача</span>
           <img id="openProfile" onclick="openModal()" src="images/user.svg" alt="user">
       </div>
    </div>
</header>

<dialog id="profileModal" class="Modal"> 
   <div class="modal-content">

    <div class="modal-header">
      <h2>Профіль</h2>
    </div>

    <div class="modal-body">

      <div class="form-row">

      </div>

      <div class="form-row">

      </div>

      <div class="form-row">

      </div>

      <div class="form-row">

      </div>

    </div>

    <div class="modal-footer">
        <button onclick="closeModal()" id="closeModal" class="closeMod">Назад</button>
        <button id="Profile" class="profileMod" onclick="window.location.href='index.html';">Вийти</button>
    </div>

   </div>
    
</dialog>

<main class="container">
  <section class="left">
     <div class="filter-panel">

        <h3>ФІЛЬТР</h3>

        <label class="filter-item">
            <input type="checkbox">
            Дата
        </label>

        <label class="filter-item">
            <input type="checkbox">
            Прогрес(%)
        </label>

        <label class="filter-item">
            <input type="checkbox">
            Сума (з більшого до меншого)
        </label>

        <label class="filter-item">
            <input type="checkbox">
            Сума (з меншого до більшого)
        </label>

        <div class="buttons">
            <button class="confirm">Підтвердити</button>
            <button class="cancel">Скасувати</button>
        </div>

    </div>
  </section>
  <div class="main">
    <div class="myGoal">
        <h3>ЦІЛЬ</h3>
        <div class="progress">
             <p>0%</p>
        </div>
    </div>

    <table>
        <caption>ВАШІ ЦІЛІ</caption>
        <thead>  
            <tr>
                <th>Назва</th>
                <th>Дата</th>
                <th>Сума</th>
                <th>Прогрес(%)</th>
            </tr>          
        </thead>
            <tr>
                <td>Машина</td>
                <td>05.04.2026</td>
                <td>205600</td>
                <td>103</td>
            </tr>
            <tr>
                <td>Машина</td>
                <td>02.01.2026</td>
                <td>5600</td>
                <td>2</td>
            </tr>
    </table>
  </div>
  <section class="right">
    <div class="goal-panel">

        <h3>ДОДАТИ ЦІЛЬ</h3>


        <div class="goal-item">
            <label for="namegoal">Назва:</label>
            <input type="text" id="namegoal" placeholder="Введіть назву">
        </div>

        <div class="goal-item">
            <label for="sumgoal">Сума:</label>
            <input type="text" id="sumgoal" placeholder="Введіть суму">
        </div>


        <div class="buttons">
            <button class="confirm">Підтвердити</button>
            <button class="cancel">Скасувати</button>
        </div>

    </div>
  </section>
</main>

<script>
  function openModal() {
    document.getElementById('profileModal').style.display = 'block';
  }
  function closeModal()  {
    document.getElementById('profileModal').style.display = 'none';
  }
</script> 

<script>
  const rows = document.querySelectorAll("table tr");

  rows.forEach(row => {
    const cells = row.querySelectorAll("td");

    if (cells.length > 0) {
      const progressCell = cells[3]; 
      const value = parseInt(progressCell.textContent);

      if (value >= 100) {
        progressCell.classList.add("green");
      }
      else{
        progressCell.classList.add("red");
      }
    }
  });
</script>
</body>
</html>
