<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Загальна Статистика</title>
    <link rel="icon" type="image/png" href="images/logoYPM.svg">
    <link rel="stylesheet" href="css/mainservicepage.css">
    <link rel="stylesheet" href="css/Modal/modalProfile.css">
</head>
<body>
<header class="header">
   <div class="header-left">
        <div class="logo">
          <img src="images/logoYPM.svg" alt="YuPeMo">
          <h4><span style="-webkit-text-stroke: 1px #4A4D45; color: #E6FFBE;">YuPeMo</span></h4>
        </div>
        <nav class="menu">
           <button onclick="window.location.href='mainpage.html';" class="mainpage"><b>Головня Сторінка</b></button> 
           <button onclick="window.location.href='dohod.html';" class="plusmoney"><b>Доходи</b></button> 
           <button onclick="window.location.href='vitraty.html';" class="minusmoney"><b>Витрати</b></button>
           <button onclick="window.location.href='cili.html';" class="goal"><b>Цілі</b></button>
        </nav>
    </div>

    <div class="header-right">
       <div class="user">
           <span id="openProfile" onclick="openModal()" style="cursor:pointer">Ім’я_користувача</span>
           <img id="openProfile" onclick="openModal()" style="cursor:pointer" src="images/user.svg" alt="user">
       </div>
    </div>
</header>

<dialog id="profileModal" class="Modal"> 
   <div class="modal-content">

    <div class="modal-header">
      <h2>Профіль</h2>
    </div>

    <div class="modal-body">

      <div class="form-row">

      </div>

      <div class="form-row">

      </div>

      <div class="form-row">

      </div>

      <div class="form-row">

      </div>

    </div>

    <div class="modal-footer">
        <button onclick="closeModal()" id="closeModal" class="closeMod">Назад</button>
        <button id="Profile" class="profileMod" onclick="window.location.href='index.html';">Вийти</button>
    </div>

   </div>
    
</dialog>

<main class="container">

    <section class="left">

        <h3 class="balance">БАЛАНС: n$</h3>

  
            <div class="chart-header">
                <div class="balance">
                     <div>Доходи:</div>
                     <div>Витрати:</div>
                 </div>
      
                <div class="filters">
                    <button id="openType" class="type">v Тип</button>
                    <button class="filterinfo">v Фільтр</button>
                </div>
            </div>

            <div class="graph">
              <img src="images/graph.jpg" alt="graph">
            </div>



        <div class="legend">

            <div class="legend-item">
                <div class="box expense"></div>
                <span>Витрати</span>
            </div>

            <div class="legend-item">
                <div class="box income"></div>
                <span>Доходи</span>
            </div>

        </div>

    </section>

    <section class="right">

        <h3>ОСТАННІ ТРАНЗАКЦІЇ</h3>

        <div class="buttons">
            <button class="filterinfo">v Фільтр</button>
            <button class="addtrans">Додати транзакцію</button>
        </div>

        <table class="table">

            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Категорія</th>
                    <th>Тип</th>
                    <th>Сума($)</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            </tbody>

        </table>

    </section>

</main>

<script>
  function openModal() {
    document.getElementById('profileModal').style.display = 'block';
  }
  function closeModal()  {
    document.getElementById('profileModal').style.display = 'none';
  }
</script> 


</body>
</html>
